version: 1
frontend:
  phases:
    preBuild:
      commands:
        - (cd v3 && npm ci)
    build:
      commands:
        - (cd v3 && npm run build)
        - rm -rf dist
        - mkdir -p dist
        - cp -r v3/out/. dist/
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - v3/node_modules/**/*
